services:
  # ── Web app: interactive line shopper ──────────────────────────────────────
  - type: web
    name: odds-shopper
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ODDS_API_KEY
        sync: false        # paste in the Render dashboard — never committed to git
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_TOKEN
        sync: false        # optional: lets you hit /api/capture manually to test

  # ── Cron: daily baseline — all main sports, 8am EST (13:00 UTC) ────────────
  - type: cron
    name: odds-shopper-capture-daily
    env: python
    schedule: "0 13 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: ncaaf,nfl,nba,ncaab,mlb,nhl

  # ── Cron: NCAAF hourly all Sunday — catches new lines as books post them ───
  # Next week's college lines typically release any time Sunday
  - type: cron
    name: odds-shopper-capture-ncaaf-sunday
    env: python
    schedule: "0 * * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: ncaaf

  # ── Cron: NFL Sunday evening — lines release after afternoon games end ──────
  # 23:00 UTC Sun ≈ 6pm EST / 7pm EDT
  - type: cron
    name: odds-shopper-capture-nfl-sunday
    env: python
    schedule: "0 23 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: nfl

  # ── Cron: NFL Monday morning — hourly midnight through 10am EST ─────────────
  # 00:00–15:00 UTC Mon ≈ 7pm Sun–10am Mon EST (lines continue updating overnight)
  - type: cron
    name: odds-shopper-capture-nfl-monday
    env: python
    schedule: "0 0-15 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: nfl

  # ── Cron: NCAAF closing lines — Saturday game window (every 15 min) ─────────
  # UTC 15:00–23:45 Sat ≈ 10am–7pm EST / 11am–8pm EDT
  - type: cron
    name: odds-shopper-capture-sat
    env: python
    schedule: "*/15 15-23 * * 6"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: ncaaf

  # ── Cron: NCAAF closing lines — late West Coast games into Sunday UTC ───────
  # UTC 00:00–05:45 Sun ≈ 7pm Sat–1am Sun EST
  - type: cron
    name: odds-shopper-capture-late
    env: python
    schedule: "*/15 0-5 * * 0"
    buildCommand: pip install -r requirements.txt
    startCommand: python capture_cron.py
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CAPTURE_SPORTS
        value: ncaaf
